<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMA 2026 | Divisi Keamanan</title>
    
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-obsidian: #030712;
            --bg-deep-slate: #0b0f19;
            --bg-glass: rgba(15, 23, 42, 0.6);
            --bg-glass-solid: rgba(15, 23, 42, 0.95);
            --border-glass: rgba(255, 255, 255, 0.08);
            
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.3);
            --primary-dark: #064e3b;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.3);
            --danger: #ef4444;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-width: 280px;
            --card-radius: 20px;
            --shadow-neon: 0 10px 30px -10px rgba(0,0,0,0.7), 0 1px 1px rgba(255,255,255,0.05) inset;
        }

        body { 
            background: var(--bg-obsidian); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #030712;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Sidebar Glassmorphic - Hanya muncul jika Logged In */
        .sidebar { 
            width: var(--sidebar-width); 
            background: rgba(4, 10, 8, 0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-glass);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1050;
            display: none; /* Dikontrol via JS berdasarkan login state */
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar.active-state {
            display: flex;
        }

        .sidebar-brand {
            padding: 2.5rem 1.75rem;
            border-bottom: 1px solid var(--border-glass);
        }

        .sidebar-brand h5 {
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 12px var(--primary-glow);
            margin: 0;
            font-size: 1.2rem;
        }

        .nav-container {
            padding: 1.5rem 1rem;
            flex-grow: 1;
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            padding: 0.9rem 1.2rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 14px;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .nav-link-custom i {
            width: 22px;
            margin-right: 14px;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .nav-link-custom:hover {
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
            border-color: rgba(255,255,255,0.05);
        }
        
        .nav-link-custom:hover i {
            transform: translateX(3px);
        }

        .nav-link-custom.active {
            background: linear-gradient(135deg, var(--primary-dark) 0%, rgba(16,185,129,0.1) 100%);
            color: var(--text-main);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-glass);
            background: rgba(0,0,0,0.3);
        }

        /* Main Wrapper */
        .main-content {
            margin-left: 0; /* Default Guest */
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            min-height: 100vh;
            padding-bottom: 3rem;
        }

        .main-content.logged-in {
            margin-left: var(--sidebar-width);
        }

        /* Top Navbar */
        .top-navbar {
            background: rgba(9, 13, 22, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* LANDING PAGE GUEST VIEW */
        .hero-banner {
            background: linear-gradient(180deg, rgba(9, 13, 22, 0.4) 0%, #030712 100%), 
                        url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1600&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            padding: 6rem 2rem;
            text-align: center;
            position: relative;
        }

        .hero-banner::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 150px;
            background: linear-gradient(0deg, #030712 0%, transparent 100%);
        }

        .hero-title {
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            margin-bottom: 1rem;
        }

        .hero-title span {
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 800px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.6;
        }

        /* Gallery & Highlight Grid */
        .gallery-container {
            padding: 2rem 2.5rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .gallery-card {
            background: var(--bg-deep-slate);
            border: 1px solid var(--border-glass);
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: var(--shadow-neon);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.15);
        }

        .gallery-img-wrapper {
            position: relative;
            height: 220px;
            overflow: hidden;
            background: #030712;
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-card:hover .gallery-img {
            transform: scale(1.08);
        }

        .gallery-badge {
            position: absolute;
            top: 15px; left: 15px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid var(--primary);
            color: var(--text-main);
            font-size: 0.7rem;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }

        .gallery-body {
            padding: 1.5rem;
        }

        .gallery-wk-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .gallery-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 1.25rem;
        }

        .gallery-footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Tactical Controls Grid */
        .dashboard-controls {
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(12px);
            padding: 1.5rem 2.5rem;
            margin: 0;
            border-bottom: 1px solid var(--border-glass);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 2px;
        }

        .form-select-pro {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 0.6rem 2.2rem 0.6rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            background-color: rgba(255,255,255,0.03);
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 16px 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            outline: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        
        /* Memastikan class form-select bawaan bootstrap di Modal juga bersih dari panah ganda */
        .form-select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        .form-select-pro:focus, .form-select-pro:hover {
            border-color: var(--primary);
            background-color: rgba(255,255,255,0.1);
            color: var(--text-main);
        }

        .form-select-pro option {
            background-color: var(--bg-obsidian);
            color: var(--text-main);
        }

        /* Glass KPI Cards */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            padding: 2rem 2.5rem;
        }

        .kpi-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-radius: var(--card-radius);
            padding: 1.75rem;
            box-shadow: var(--shadow-neon);
            border: 1px solid var(--border-glass);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--card-color, var(--primary)), transparent);
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.8), 0 0 15px rgba(255,255,255,0.05);
        }

        .kpi-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }

        .kpi-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0;
            letter-spacing: -0.5px;
        }

        .kpi-subtext {
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Visual Layout */
        .visual-grid {
            padding: 0 2.5rem 2rem 2.5rem;
        }

        .viz-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-radius: var(--card-radius);
            padding: 1.75rem;
            box-shadow: var(--shadow-neon);
            border: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .viz-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 0.75rem;
        }

        .viz-title i {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        #dashMap { 
            height: 520px; 
            border-radius: 14px; 
            width: 100%;
            border: 1px solid var(--border-glass);
        }

        /* Pulse Radar Marker Animation */
        .custom-pulse-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pulse-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #fff;
            position: relative;
            z-index: 2;
        }
        .pulse-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            animation: pulse-radar 2.2s infinite;
            z-index: 1;
        }
        @keyframes pulse-radar {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        .leaflet-popup-content-wrapper {
            background: #090d16 !important;
            color: #f8fafc !important;
            border: 2px solid var(--primary) !important;
            backdrop-filter: blur(12px) !important;
            border-radius: 16px !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 15px rgba(16, 185, 129, 0.2) !important;
            padding: 8px !important;
        }

        .leaflet-popup-content {
            margin: 8px 12px !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            line-height: 1.4 !important;
        }

        .leaflet-popup-tip {
            background: #090d16 !important;
            border-left: 2px solid var(--primary) !important;
            border-right: 2px solid var(--primary) !important;
        }

        .popup-title {
            font-size: 14px !important;
            font-weight: 800 !important;
            color: #ffffff !important;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .popup-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px !important;
        }

        .popup-table td {
            padding: 4px 0 !important;
            border-bottom: 1px solid rgba(255,255,255,0.06) !important;
            vertical-align: top;
        }

        .popup-label {
            color: var(--text-muted) !important;
            font-weight: 700;
            text-transform: uppercase;
            width: 35%;
        }

        .popup-value {
            color: #ffffff !important;
            font-weight: 600;
            text-align: right;
        }

        /* Insights grid */
        .section-label {
            padding: 0 2.5rem;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-label::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: var(--border-glass);
        }

        .insight-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            padding: 0 2.5rem 2.5rem 2.5rem;
        }

        .insight-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-neon);
            border: 1px solid var(--border-glass);
            height: 100%;
            transition: all 0.3s ease;
        }
        
        .insight-card:hover {
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-3px);
        }

        .insight-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.25rem;
            min-height: 44px;
        }

        .insight-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            max-width: 75%;
            line-height: 1.4;
        }

        .insight-perc {
            font-size: 0.9rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .insight-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 1.5rem;
        }

        .insight-stat-val {
            font-size: 1.25rem;
            font-weight: 800;
            display: block;
            color: var(--text-main);
        }

        .insight-stat-lbl {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Inputs & Modals */
        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border-radius: 24px;
            color: var(--text-main);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-glass);
        }

        .modal-body {
            background: rgba(0,0,0,0.1) !important;
        }

        .form-control, .form-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-color: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #f8fafc !important;
            border-radius: 12px;
            padding: 0.6rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background-color: rgba(15, 23, 42, 0.95) !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3) !important;
            color: #ffffff !important;
            outline: none;
        }

        .form-select option {
            background-color: var(--bg-obsidian) !important;
            color: #f8fafc !important;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .form-control:focus, .form-select:focus {
            background-color: rgba(255,255,255,0.08);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            color: var(--text-main) !important;
        }

        /* Perbaikan Kontras Teks dan Background Dropdown */
        .form-control, .form-select {
            color: var(--text-main) !important;
        }
        
        .form-select option {
            background-color: var(--bg-obsidian);
            color: var(--text-main);
        }

        /* Inversi warna ikon kalender bawaan browser untuk tema gelap */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        /* Table */
        .table {
            color: var(--text-main) !important;
        }
        
        .table th {
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border-glass) !important;
            padding: 1rem 0.75rem;
        }

        .table td {
            vertical-align: middle;
            border-bottom: 1px solid rgba(255,255,255,0.04) !important;
            padding: 1rem 0.75rem;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.02) !important;
        }

        .loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(3, 7, 18, 0.95); z-index: 9999; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
        }

        #realtimeClock { font-weight: 800; color: var(--primary); font-size: 0.95rem; letter-spacing: 0.5px; }

        /* Badge Custom for Highlights & Animation */
        .badge-line {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f8fafc; /* Kontras Tinggi Teks Diperbaiki */
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: inline-block;
        }
        .badge-line:hover {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* Sequential Pulse Animation for Line Anggaran */
        .badge-pulse {
            animation: badge-glow 4s infinite;
        }
        @keyframes badge-glow {
            0%, 100% { box-shadow: 0 0 0 rgba(16, 185, 129, 0); border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #f8fafc; }
            15% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); border-color: var(--primary); background: rgba(16, 185, 129, 0.15); color: var(--primary); transform: translateY(-2px); }
            30% { box-shadow: 0 0 0 rgba(16, 185, 129, 0); border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #f8fafc; transform: translateY(0); }
        }

        /* Modern Cyber Loader Animation */
        .cyber-loader {
            width: 55px;
            height: 55px;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: cyber-spin 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            position: relative;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        .cyber-loader::before {
            content: '';

    <script>
        // CONFIGURATION LAYER HARDENING (EOS-GAS-016): Masukkan URL Web App Apps Script Production Anda di bawah ini.
        const GAS_SECURITY_API_URL = "https://script.google.com/macros/s/AKfycbzLz7bDZjLIjjTRXpjP4T0nKTi1lmEmT6duJ6IhlBQdKd3qdsEP4hbXOKGX9A3iSswk/exec"; 

        if (typeof google === 'undefined' || !google.script) {
            window.google = {
                script: {
                    run: {
                        success: null,
                        failure: null,
                        withSuccessHandler: function(cb) { this.success = cb; return this; },
                        withFailureHandler: function(cb) { this.failure = cb; return this; },
                        getAppData: function(role, wkAccess) {
                        const url = `${GAS_SECURITY_API_URL}?action=getAppData&role=${encodeURIComponent(role)}&wkAccess=${encodeURIComponent(wkAccess)}&_t=${Date.now()}`;
                            
                            // Gunakan {redirect: 'follow'} untuk memastikan fetch mengikuti redirect dari Google
                            fetch(url, { redirect: 'follow' })
                                .then(res => {
                                    if (!res.ok) throw new Error("HTTP error! status: " + res.status);
                                    return res.json();
                                })
                                .then(d => {
                                    if (d && !d.error) {
                                        localStorage.setItem("cache_security_db", JSON.stringify(d));
                                    }
                                    if (this.success) this.success(d);
                                })
                                .catch(err => {
                                    console.error("Sync Error:", err);
                                    const backup = localStorage.getItem("cache_security_db");
                                    if (backup) {
                                        if (this.success) this.success(JSON.parse(backup));
                                    } else if (this.failure) {
                                        this.failure(err);
                                    }
                                });
                        },
                        loginUser: function(form) {
                            fetch(GAS_SECURITY_API_URL, { method: 'POST', body: JSON.stringify({ action: 'loginUser', data: { form: form } }) })
                                .then(res => res.json()).then(d => { if(this.success) this.success(d.result); }).catch(err => { if(this.failure) this.failure(err); });
                        },
                        saveMasterPagu: function(payload, userData) {
                            fetch(GAS_SECURITY_API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveMasterPagu', data: { payload: payload, userData: userData } }) })
                                .then(res => res.json()).then(d => { if(this.success) this.success(d.result); }).catch(err => { if(this.failure) this.failure(err); });
                        },
                        deleteMasterPagu: function(id, userData) {
                            fetch(GAS_SECURITY_API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteMasterPagu', data: { id: id, userData: userData } }) })
                                .then(res => res.json()).then(d => { if(this.success) this.success(d.result); }).catch(err => { if(this.failure) this.failure(err); });
                        },
                        saveTransaction: function(type, payload, userData) {
                            const txData = { type: type, payload: payload, userData: userData, timestamp: Date.now() };
                            
                            // Deteksi Jika Perangkat Sedang Kehilangan Sinyal/Jaringan
                            if (!navigator.onLine) {
                                let queue = JSON.parse(localStorage.getItem("offline_transactions") || "[]");
                                queue.push(txData);
                                localStorage.setItem("offline_transactions", JSON.stringify(queue));
                                
                                Swal.fire({
                                    icon: 'info',
                                    title: 'Jurnal Disimpan Offline',
                                    text: 'Koneksi terputus. Data Anda aman tersimpan di memori lokal dan akan di-sync otomatis begitu sinyal kembali!',
                                    timer: 4000
                                });
                                
                                if (this.success) this.success({ success: true, offline: true });
                                return;
                            }

                            // Aliran Eksekusi Normal Jika Online
                            fetch(GAS_SECURITY_API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveTransaction', data: { type: type, payload: payload, userData: userData } }) })
                                .then(res => res.json())
                                .then(d => { if(this.success) this.success(d.result); })
                                .catch(err => {
                                    // Fallback aman jika fetch gagal di tengah jalan akibat sinyal tidak stabil
                                    let queue = JSON.parse(localStorage.getItem("offline_transactions") || "[]");
                                    queue.push(txData);
                                    localStorage.setItem("offline_transactions", JSON.stringify(queue));
                                    Swal.fire('Sinyal Tidak Stabil', 'Gagal menghubungi server cloud. Data dialihkan ke antrean offline lokal.', 'warning');
                                    if (this.success) this.success({ success: true, offline: true });
                                });
                        },
                        updateTransaction: function(id, sType, payload, userData) {
                            const txData = { action: 'update', id: id, sType: sType, payload: payload, userData: userData, timestamp: Date.now() };
                            
                            // Proteksi Jika User Melakukan Edit Saat Kehilangan Jaringan
                            if (!navigator.onLine) {
                                let queue = JSON.parse(localStorage.getItem("offline_transactions") || "[]");
                                queue.push(txData);
                                localStorage.setItem("offline_transactions", JSON.stringify(queue));
                                
                                Swal.fire({
                                    icon: 'info',
                                    title: 'Revisi Disimpan Offline',
                                    text: 'Koneksi terputus. Perubahan data aman tersimpan di memori lokal dan akan di-sync otomatis begitu sinyal kembali!',
                                    timer: 4000
                                });
                                
                                if (this.success) this.success({ success: true, offline: true });
                                return;
                            }

                            // Aliran Eksekusi Normal Jika Online
                            fetch(GAS_SECURITY_API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateTransaction', data: { id: id, sType: sType, payload: payload, userData: userData } }) })
                                .then(res => res.json()).then(d => { if(this.success) this.success(d.result); })
                                .catch(err => {
                                    // Fallback aman jika koneksi tiba-tiba terputus saat proses pengiriman data
                                    let queue = JSON.parse(localStorage.getItem("offline_transactions") || "[]");
                                    queue.push(txData);
                                    localStorage.setItem("offline_transactions", JSON.stringify(queue));
                                    Swal.fire('Sinyal Tidak Stabil', 'Gagal memperbarui cloud server. Revisi dialihkan ke antrean offline lokal.', 'warning');
                                    if (this.success) this.success({ success: true, offline: true });
                                });
                        },
                        deleteData: function(id, sType, userData) {
                            fetch(GAS_SECURITY_API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteData', data: { id: id, sType: sType, userData: userData } }) })
                                .then(res => res.json()).then(d => { if(this.success) this.success(d.result || d); }).catch(err => { if(this.failure) this.failure(err); });
                        },
                        updateUserProfile: function(form) {
                            fetch(GAS_SECURITY_API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateUserProfile', data: { form: form } }) })
                                .then(res => res.json()).then(d => { if(this.success) this.success(d.result); }).catch(err => { if(this.failure) this.failure(err); });
                        }
                    }
                }
            };
        }

        const memStorageFallback = {};
        const safeStorage = {
            getItem(key) { try { return window.localStorage.getItem(key); } catch(e) { return memStorageFallback[key] || null; } },
            setItem(key, val) { try { window.localStorage.setItem(key, val); } catch(e) { memStorageFallback[key] = val; } },
            removeItem(key) { try { window.localStorage.removeItem(key); } catch(e) { delete memStorageFallback[key]; } }
        };

        /**
         * GLOBAL STATE
         */
        let state = {
            user: null,
            view: 'landing-page',
            filters: { wk: 'ALL', item: 'ALL', detail: 'ALL', start: 0, end: 11 },
            db: { 
                masterWK: [], masterPilihan: [], masterBUJP: [], pagu: [], 
                realisasiInternal: [], realisasiInvoice: [], realisasiStakeholder: [], masterJenisTrx: []
            }, 
            charts: { categories: {} },
            map: null,
            markers: {}
        };

        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const monthShortNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];

        window.onload = function() {
            checkLoginState();
            
            // PWA Service Worker Registration
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('PWA: Service Worker Aktif pada scope:', reg.scope))
                    .catch(err => console.error('PWA: Registrasi Service Worker Gagal:', err));
            }

            // Daftarkan listener sinyal untuk auto-sync background process
            window.addEventListener('online', syncOfflineTransactions);
            if (navigator.onLine) syncOfflineTransactions();
        };

        /**
         * ENGINE SINKRONISASI INTERAKTIF: Memproses data offline dengan persetujuan Pop-up Pengguna
         */
        function syncOfflineTransactions() {
            if (!navigator.onLine) return;
            var queue = JSON.parse(localStorage.getItem("offline_transactions") || "[]");
            if (queue.length === 0) return;

            Swal.fire({
                title: 'Koneksi Internet Pulih!',
                text: 'Terdeteksi ' + queue.length + ' transaksi yang Anda input saat offline. Apakah Anda ingin menyimpannya ke Google Sheets sekarang?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#ef4444',
                confirmButtonText: '<i class="fas fa-cloud-arrow-up me-2"></i>Iya, Simpan Data',
                cancelButtonText: '<i class="fas fa-trash-can me-2"></i>Tidak, Abaikan',
                allowOutsideClick: false
            }).then(function(choice) {
                if (choice.isConfirmed) {
                    startLoading();
                    var savedItemsList = [];
                    var failedQueue = [];
                    var pointer = 0;

                    function uploadNextItem() {
                        if (pointer >= queue.length) {
                            endLoading();
                            localStorage.setItem("offline_transactions", JSON.stringify(failedQueue));
                            
                            if (savedItemsList.length > 0) {
                                var itemsHtml = '<ol class="text-start small text-white-50" style="padding-left: 20px;">' + 
                                               savedItemsList.map(function(item) { return '<li>' + item + '</li>'; }).join('') + 
                                               '</ol>';
                                Swal.fire({
                                    icon: 'success',
                                    title: 'Sinkronisasi Berhasil!',
                                    html: 'Berikut rincian data yang sukses dibukukan ke Cloud:<br/><br/>' + itemsHtml,
                                    confirmButtonColor: '#10b981'
                                });
                            }
                            if (failedQueue.length > 0) {
                                Swal.fire('Gagal Sebagian', failedQueue.length + ' data gagal terupload karena gangguan server. Sistem menyimpannya kembali ke antrean lokal.', 'warning');
                            }
                            loadData(null, true);
                            return;
                        }

                        var tx = queue[pointer];
                        var bodyPayload = {};
                        var itemLabel = "";

                        if (tx.action === 'update') {
                            bodyPayload = { action: 'updateTransaction', data: { id: tx.id, sType: tx.sType, payload: tx.payload, userData: tx.userData } };
                            itemLabel = '[REVISI] ' + (tx.payload.WK || 'Wilayah') + ' - Uraian: ' + (tx.payload.Keterangan || 'N/A') + ' (Rp ' + Number(tx.payload.Jumlah || 0).toLocaleString('id-ID') + ')';
                        } else {
                            bodyPayload = { action: 'saveTransaction', data: { type: tx.type, payload: tx.payload, userData: tx.userData } };
                            itemLabel = '[BARU] ' + (tx.payload.WK || 'Wilayah') + ' - Uraian: ' + (tx.payload.Keterangan || 'N/A') + ' (Rp ' + Number(tx.payload.Jumlah || 0).toLocaleString('id-ID') + ')';
                        }

                        fetch(GAS_SECURITY_API_URL, { 
                            method: 'POST', 
                            body: JSON.stringify(bodyPayload) 
                        })
                        .then(function(res) {
                            if (!res.ok) throw new Error("Network response unstable");
                            return res.json();
                        })
                        .then(function(d) {
                            if (d && d.success && d.result && (d.result.success || d.result.success === undefined)) {
                                savedItemsList.push(itemLabel);
                            } else {
                                failedQueue.push(tx);
                            }
                            pointer++;
                            uploadNextItem();
                        })
                        .catch(function(err) {
                            console.error("Item sync error:", err);
                            failedQueue.push(tx);
                            pointer++;
                            uploadNextItem();
                        });
                    }

                    uploadNextItem();

                } else if (choice.dismiss === Swal.DismissReason.cancel) {
                    localStorage.removeItem("offline_transactions");
                    Swal.fire({
                        icon: 'warning',
                        title: 'Antrean Dihapus',
                        text: 'Seluruh data transaksi offline diabaikan dan dibersihkan dari memori perangkat.',
                        timer: 3000,
                        showConfirmButton: false

        function parseLocalDate(dateStr) {
            if (!dateStr) return null;
            if (dateStr instanceof Date) return dateStr;
            let str = String(dateStr).trim();
            let match = str.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
            if (match) return new Date(parseInt(match[1]), parseInt(match[2]) - 1, parseInt(match[3]));
            match = str.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
            if (match) return new Date(parseInt(match[3]), parseInt(match[2]) - 1, parseInt(match[1]));
            let parsed = new Date(str);
            if (!isNaN(parsed.getTime())) return parsed;
            return null;
        }

                        if(state.view === 'transaksi') renderTrxTable();
                        if(state.view === 'pagu') renderPaguTable();
                        if(callback) callback();
                    })
                    .withFailureHandler(() => {
                        endLoading();
                        Swal.fire('Error', 'Gagal memproses sinkronisasi database cloud.', 'error');
                    })
                    .getAppData(role, access);

        function renderDashboardContent() {
            if(!state.db) return;
            let p = state.db.pagu || [], r = [...(state.db.realisasiInternal || []), ...(state.db.realisasiInvoice || []), ...(state.db.realisasiStakeholder || [])];
            if (state.filters.wk !== 'ALL') { p = p.filter(x => x.WK === state.filters.wk); r = r.filter(x => x.WK === state.filters.wk); }
            if (state.filters.item !== 'ALL') { p = p.filter(x => x.Item === state.filters.item); r = r.filter(x => x.Item === state.filters.item); }
            if (state.filters.detail !== 'ALL') { p = p.filter(x => x.Deskripsi === state.filters.detail); r = r.filter(x => x.Pilihan_Anggaran === state.filters.detail); }
            r = r.filter(x => { 
                const d = parseLocalDate(x.Tanggal);
                if (!d || isNaN(d.getTime())) return false;
                return d.getMonth() >= state.filters.start && d.getMonth() <= state.filters.end; 
            });

            const tP = p.reduce((a,b) => a + Number(b.Pagu || 0), 0);
            const tR = r.reduce((a,b) => a + Number(b.Jumlah || 0), 0);
            const percUsed = tP > 0 ? (tR/tP)*100 : 0;
            const percRem = Math.max(0, 100 - percUsed);

            let wkFiltered = state.db.masterWK || [];
            if (state.filters.wk !== 'ALL') wkFiltered = wkFiltered.filter(x => x.Nama_WK === state.filters.wk);
            const tPersonnel = wkFiltered.reduce((a,b) => a + Number(b.PERSONNEL_COUNT || 0), 0);

            const elP = document.getElementById('stat-pagu'), elR = document.getElementById('stat-real'), elS = document.getElementById('stat-sisa'), elPr = document.getElementById('perc-real');
            const elSubSisa = document.getElementById('sub-sisa'), elStat4Val = document.getElementById('stat-4-val'), elSubStat4 = document.getElementById('sub-stat-4'), elLabel = document.getElementById('insight-label-text');

            if(elP) elP.innerText = fmt(tP);
            if(elR) elR.innerText = fmt(tR);
            if(elS) elS.innerText = fmt(tP - tR);
            if(elPr) elPr.innerText = `${percUsed.toFixed(2)}% Penyerapan`;
            if(elSubSisa) elSubSisa.innerText = `${percRem.toFixed(2)}% Sisa`;
            if(elStat4Val) elStat4Val.innerText = tPersonnel.toLocaleString('id-ID');
            if(elSubStat4) elSubStat4.innerText = state.filters.wk === 'ALL' ? 'Seluruh WK' : `Wilayah ${state.filters.wk}`;
            if(elLabel) elLabel.innerText = state.filters.wk === 'ALL' ? 'Rincian Per LINE ANGGARAN WP&B' : `Rincian LINE ANGGARAN Wilayah ${state.filters.wk}`;

            requestAnimationFrame(() => {
                updateMap(p, r);
                renderCategoryCards(p, r);
                if (state.filters.wk !== 'ALL' && state.map) {
                    if (state.filters.item === 'BS-11') {
                        const jkt = state.db.masterWK.find(w => w.Nama_WK.toUpperCase() === 'JAKARTA');
                        if (jkt) state.map.setView([parseFloat(jkt.LAT), parseFloat(jkt.LNG)], 8);
                        if (state.markers[state.filters.wk]) state.markers[state.filters.wk].openPopup();
                    } else if (state.markers[state.filters.wk]) {
                        state.map.setView(state.markers[state.filters.wk].getLatLng(), 7); 
                        state.markers[state.filters.wk].openPopup();
                    }
                } else if (state.filters.wk === 'ALL' && state.map) {
                    state.map.setView([-1.0, 116.0], 5);
                }
            });
        }

        function renderCategoryCards(pData, rData) {
            const container = document.getElementById('categoryCardsContainer');
            if (!container || !state.db.masterPilihan) return;
            let html = '';
            state.db.masterPilihan.forEach((item, index) => {
                const name = item.Nama_Pilihan;
                const pVal = pData.filter(x => x.Deskripsi === name).reduce((a,b) => a + Number(b.Pagu || 0), 0);
                const rVal = rData.filter(x => x.Pilihan_Anggaran === name).reduce((a,b) => a + Number(b.Jumlah || 0), 0);

                const perc = pVal > 0 ? (rVal / pVal) * 100 : 0;
                const colorClass = perc > 90 ? 'danger' : (perc > 60 ? 'warning' : 'success');
                const colorHex = perc > 90 ? '#ef4444' : (perc > 60 ? '#f59e0b' : '#10b981');

                html += `
                    <div class="insight-card">
                        <div class="insight-header">
                            <h5 class="insight-title">${name}</h5>

                            <div>
                                <span class="insight-stat-lbl">Pagu Definitif</span>

                            </div>

                        </div>
                    </div>

                    const ctx = document.getElementById(`spark-${index}`);

                });
            });

        function updateMap(pData, rData) {
            if (!state.map) return;
            Object.values(state.markers).forEach(m => state.map.removeLayer(m));
            state.markers = {};

            const isBS11Filter = state.filters.item === 'BS-11';
            const isWKSelected = state.filters.wk !== 'ALL';
            const jktData = state.db.masterWK.find(w => w.Nama_WK.toUpperCase() === 'JAKARTA') || {};

            (state.db.masterWK || []).forEach(wk => {
                let lat = parseFloat(wk.LAT), lng = parseFloat(wk.LNG);
                if (isNaN(lat) || isNaN(lng)) return;
                if (isBS11Filter && isWKSelected) {
                    if (jktData.LAT) { lat = parseFloat(jktData.LAT); lng = parseFloat(jktData.LNG); }
                    if (wk.Nama_WK !== state.filters.wk) return;
                }

                const pVal = pData.filter(x => x.WK === wk.Nama_WK).reduce((a,b) => a + Number(b.Pagu || 0), 0);
                const rVal = rData.filter(x => x.WK === wk.Nama_WK).reduce((a,b) => a + Number(b.Jumlah || 0), 0);
                const perc = pVal > 0 ? (rVal / pVal) * 100 : 0;
                
                const profileSource = (isBS11Filter && isWKSelected) ? jktData : wk;
                const endDate = new Date(profileSource.CONTRACT_END_DATE);
                const diffMonths = Math.ceil((endDate.getTime() - new Date().getTime()) / (1000 * 60 * 60 * 24 * 30.44)); 
                const displayRemaining = diffMonths > 0 ? `${diffMonths} Bulan` : 'Berakhir';

                let color = '#10b981';
                const currentWKName = wk.Nama_WK ? wk.Nama_WK.trim().toUpperCase() : "";
                if (currentWKName === 'KORINCI BARU' || currentWKName === 'TUNAS ENERGI') color = '#3b82f6'; 
                else { if (diffMonths <= 1) color = '#ef4444'; else if (diffMonths <= 2) color = '#f59e0b'; }
                
                const icon = L.divIcon({ className: 'leaflet-pulse-icon', html: `<div class="custom-pulse-container"><div class="pulse-dot" style="background: ${color}; box-shadow: 0 0 10px ${color};"></div><div class="pulse-ring" style="background: ${color};"></div></div>`, iconSize: [14, 14], iconAnchor: [7, 7] });
                const formattedDate = !isNaN(endDate.getTime()) ? `${String(endDate.getDate()).padStart(2, '0')} ${monthShortNames[endDate.getMonth()]} ${String(endDate.getFullYear()).slice(-2)}` : '-';

                const marker = L.marker([lat, lng], { icon }).addTo(state.map);
                const displayBUJP = (isBS11Filter) ? (profileSource.BUJP_NAME || 'PTC') : (wk.BUJP_NAME || '-');
                
                marker.bindPopup(`
                    <div style="min-width: 230px; font-family: 'Plus Jakarta Sans', sans-serif;">
                        <div class="popup-title"><i class="fas fa-shield-halved text-success me-2"></i>${(isBS11Filter && isWKSelected) ? state.filters.wk : wk.Nama_WK}</div>
                        <table class="popup-table">
                            <tr><td class="popup-label">BUJP</td><td class="popup-value">${displayBUJP}</td></tr>
                            <tr><td class="popup-label">Personil</td><td class="popup-value">${profileSource.PERSONNEL_COUNT || 0} orang</td></tr>
                            <tr><td class="popup-label">Serapan</td><td class="popup-value" style="color: ${perc > 90 ? '#ef4444' : '#10b981'} !important; font-weight: 800;">${perc.toFixed(2)}%</td></tr>
                            <tr><td class="popup-label">Akhir Kontrak</td><td class="popup-value">${formattedDate}</td></tr>
                            <tr><td class="popup-label">Sisa Waktu</td><td class="popup-value" style="color: #3b82f6 !important; font-weight: 700;">${displayRemaining}</td></tr>
                        </table>
                    </div>
                `);
                state.markers[wk.Nama_WK] = marker;
            });
        }

        async function handleTrxEditSubmit(e) {
            e.preventDefault(); const form = e.target, btn = document.getElementById('btnTrxUpdate'), id = document.getElementById('editTrxId').value, sType = document.getElementById('editTrxType').value;
            const payload = Object.fromEntries(new FormData(form)), fileInput = document.getElementById('editTrxFile');
            try {
                if (btn) btn.disabled = true; startLoading();
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0], base64 = await new Promise((res, rej) => { const rd = new FileReader(); rd.readAsDataURL(file); rd.onload = () => res(rd.result); rd.onerror = () => rej(new Error('Gagal memproses berkas.')); });
                    payload.fileContent = base64.split(',')[1]; payload.fileName = file.name; payload.mimeType = file.type;
                }
                if (typeof google === 'undefined') {
                    setTimeout(() => { endLoading(); if (btn) btn.disabled = false; bootstrap.Modal.getInstance(document.getElementById('modalEditTrx')).hide(); Swal.fire('Sukses', 'Jurnal berhasil direvisi (Demo)', 'success'); loadData(null, true); }, 1000);
                } else {
                    google.script.run.withSuccessHandler(res => { endLoading(); if (btn) btn.disabled = false; if (res && res.success) { bootstrap.Modal.getInstance(document.getElementById('modalEditTrx')).hide(); Swal.fire('Berhasil', 'Entri jurnal telah direvisi', 'success'); loadData(null, true); } else Swal.fire('Gagal', res.message, 'error'); })
                    .withFailureHandler(err => { endLoading(); if (btn) btn.disabled = false; Swal.fire('Error', err.toString(), 'error'); }).updateTransaction(id, sType, payload, state.user);
                }
            } catch (err) { endLoading(); if (btn) btn.disabled = false; Swal.fire('Error', err.message, 'error'); }
        }

        async function handleTrxSubmit(e) {
            e.preventDefault(); const form = e.target, btn = document.getElementById('btnTrxSubmit'), data = Object.fromEntries(new FormData(form)), fileInput = document.getElementById('evFile');
            try {
                if (btn) btn.disabled = true; startLoading();
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0], base64 = await new Promise((res, rej) => { const rd = new FileReader(); rd.readAsDataURL(file); rd.onload = () => res(rd.result); rd.onerror = () => rej(new Error('Gagal membaca file')); });
                    data.fileContent = base64.split(',')[1]; data.fileName = file.name; data.mimeType = file.type;
                }
                if (typeof google === 'undefined') {
                    setTimeout(() => { endLoading(); if (btn) btn.disabled = false; Swal.fire('Sukses', 'Posting jurnal berhasil (Demo)', 'success'); form.reset(); const m = bootstrap.Modal.getInstance(document.getElementById('modalAddTrx')); if(m) m.hide(); loadData(null, true); }, 1000);
                } else {
                    google.script.run.withSuccessHandler(res => { endLoading(); if (btn) btn.disabled = false; if(res && res.success) { Swal.fire('Berhasil', 'Jurnal transaksi berhasil diposting', 'success'); form.reset(); const m = bootstrap.Modal.getInstance(document.getElementById('modalAddTrx')); if(m) m.hide(); loadData(null, true); } else Swal.fire('Gagal', res.message, 'error'); })
                    .withFailureHandler(err => { endLoading(); if (btn) btn.disabled = false; Swal.fire('Error', err.toString(), 'error'); }).saveTransaction(data.type, data, state.user);
                }
            } catch (err) { endLoading(); if (btn) btn.disabled = false; Swal.fire('Error', err.message, 'error'); }
        }

        function handlePaguSubmit(e) {
            e.preventDefault(); const form = e.target, data = Object.fromEntries(new FormData(form)); startLoading();
            if (typeof google === 'undefined') { 
                setTimeout(() => { endLoading(); Swal.fire('Sukses', 'Pengesahan Pagu diproses (Demo)', 'success'); form.reset(); const m = bootstrap.Modal.getInstance(document.getElementById('modalAddPagu')); if(m) m.hide(); loadData(null, true); }, 800); 
            } else {
                google.script.run.withSuccessHandler(res => { endLoading(); if(res && res.success) { Swal.fire('Berhasil', 'Alokasi pagu telah disahkan', 'success'); form.reset(); const m = bootstrap.Modal.getInstance(document.getElementById('modalAddPagu')); if(m) m.hide(); loadData(null, true); } })
                .saveMasterPagu(data, state.user);
            }
        }

        function renderProfil(el) {
            el.innerHTML = `
                <div class="p-4 d-flex justify-content-center">
                    <div class="kpi-card text-center" style="max-width: 500px; width: 100%;">
                        <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);"><i class="fas fa-user-shield fa-3x text-white"></i></div>
                        <h4 class="fw-extrabold mb-1">${state.user ? state.user.nama : 'USER'}</h4>
                        <p class="small fw-bold text-uppercase mb-4" style="letter-spacing: 2px; color: var(--primary);">OTORITAS AKUN ${state.user ? state.user.role : ''}</p>
                        <hr class="mb-4" style="border-color: var(--border-glass)">
                        <form onsubmit="handleProfileUpdate(event)">
                            <div class="mb-3 text-start"><label class="control-label">Nama Pengguna</label><input name="nama" class="form-control" value="${state.user ? state.user.nama : ''}" required style="border-radius: 12px;"></div>
                            <div class="mb-3 text-start"><label class="control-label">ID Username</label><p class="fw-bold text-white mb-0 ps-1">${state.user ? state.user.username : ''}</p></div>
                            <div class="mb-3 text-start"><label class="control-label">Sektor Akses Wilayah</label><p class="fw-bold text-success mb-0 ps-1" style="color: var(--primary) !important;">${state.user ? state.user.wkAccess : ''}</p></div>
                            <div class="mb-4 text-start"><label class="control-label">Konfirmasi Kata Sandi Baru</label><input type="password" name="password" class="form-control" placeholder="Biarkan kosong jika tidak ingin mengubah" style="border-radius: 12px;"></div>
                            <button type="submit" class="btn btn-success w-100 fw-bold py-3 shadow" style="border-radius: 14px; background: var(--primary);">PERBARUI IDENTITAS SYSTEM</button>
                            <button type="button" class="btn btn-outline-danger w-100 mt-3 fw-bold py-2" style="border-radius: 14px;" onclick="logout()">LOGOUT / SELESAI SESI</button>
                        </form>
                    </div>
                </div>`;
        }

        function handleProfileUpdate(e) {
            e.preventDefault(); const data = Object.fromEntries(new FormData(e.target)); startLoading();
            if (typeof google === 'undefined') { 
                setTimeout(() => { endLoading(); state.user.nama = data.nama; renderApp(); Swal.fire('Sukses', 'Profil diperbarui (Demo)', 'success'); }, 800); 
            } else { 
                google.script.run.withSuccessHandler(res => { endLoading(); if(res && res.success) { state.user.nama = res.newName || data.nama; safeStorage.setItem('budget_session_2026', JSON.stringify(state.user)); renderApp(); Swal.fire('Berhasil', 'Informasi profil diperbarui', 'success'); } else Swal.fire('Gagal', res.message, 'error'); })
                .updateUserProfile(data); 
            }
        }

        function renderLoginPage(el) {
            el.innerHTML = `
                <div style="background: linear-gradient(135deg, var(--bg-obsidian) 0%, #022c22 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
                    <div class="p-5 rounded-4" style="max-width:420px; width:100%; background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(20px); box-shadow: var(--shadow-neon);">
                        <div class="text-center mb-4">
                            <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 70px; height: 70px; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--primary);"><i class="fas fa-shield-halved fa-2x text-success" style="color: var(--primary) !important;"></i></div>
                            <h4 class="fw-bold text-white">SECURE GATEWAY</h4>
                            <p class="small text-muted" style="letter-spacing: 1px; font-weight:600;">DIVISI SEKURITI KONEKSI AMAN</p>
                        </div>
                        <form onsubmit="handleLogin(event)">
                            <div class="mb-3"><label class="small fw-bold text-muted mb-1">Username</label><input name="username" class="form-control" required style="border-radius:12px;"></div>
                            <div class="mb-4"><label class="small fw-bold text-muted mb-1">Password</label><input type="password" name="password" class="form-control" required style="border-radius:12px;"></div>
                            <button type="submit" class="btn btn-success w-100 py-3 fw-bold shadow-lg" style="border-radius:14px; background: var(--primary); letter-spacing:1px;">AUTENTIKASI</button>
                            <button type="button" class="btn btn-link w-100 mt-3 text-muted small text-decoration-none" onclick="setView('landing-page')">KEMBALI KE PORTAL PUBLIK</button>
                        </form>
                    </div>
                </div>`;
        }

        function handleLogin(e) {
            e.preventDefault(); const data = Object.fromEntries(new FormData(e.target)); startLoading();
            if (typeof google === 'undefined') {
                setTimeout(() => { endLoading(); if(data.username === 'admin') { state.user = { username: 'admin', nama: 'Administrator', role: 'ADMIN', wkAccess: 'ALL' }; safeStorage.setItem('budget_session_2026', JSON.stringify(state.user)); setView('dashboard', true); } }, 1000);
            } else {
                google.script.run.withSuccessHandler(res => { 
                    endLoading(); 
                    if (res && res.success) { 
                        safeStorage.setItem('budget_session_2026', JSON.stringify(res.user)); 
                        state.user = res.user; 
                        // FORCE LOAD TRUE: Hancurkan cache data tamu, paksa server menarik alokasi pagu riil user
                        setView('dashboard', true); 
                    } else Swal.fire('Gagal', res.message, 'error'); 
                }).loginUser(data);
            }
        }

        function delData(id, sType) {
            if (!id) {
                Swal.fire('Gagal', 'ID Transaksi tidak valid.', 'error');
                return;
            }
            Swal.fire({
                title: 'Apakah anda yakin?',
                text: "Jurnal akan dibatalkan/dihapus dari server.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#1e293b',
                confirmButtonText: 'Hapus Jurnal!',
                cancelButtonText: 'Batal'
            }).then(r => {
                if (r.isConfirmed) {
                    startLoading();
                    if (typeof google === 'undefined') {
                        endLoading();
                        loadData(null, true);
                    } else {
                        google.script.run
                            .withSuccessHandler(res => {
                                endLoading();
                                if (res && res.success) {
                                    Swal.fire('Berhasil', 'Jurnal transaksi berhasil dihapus.', 'success');
                                    loadData(null, true);
                                } else {
                                    Swal.fire('Gagal', res ? res.message : 'Gagal menghapus data dari server.', 'error');
                                }
                            })
                            .withFailureHandler(err => {
                                endLoading();
                                Swal.fire('Error', err.toString(), 'error');
                            })
                            .deleteData(id, sType, state.user);
                    }
                }
            });
        }
        function delPagu(id) {
    if (!id) {
        Swal.fire('Gagal', 'ID Pagu tidak valid atau tidak terdeteksi pada baris ini.', 'error');
        return;
    }
    Swal.fire({
        title: 'Batalkan Pengesahan?',
        text: "Pagu definitif ini akan ditarik kembali dari database.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#1e293b',
        confirmButtonText: 'Tarik Pagu!',
        cancelButtonText: 'Batal'
    }).then(r => {
        if (r.isConfirmed) {
            startLoading();
            if (typeof google === 'undefined') {
                endLoading();
                loadData(null, true);
            } else {
                google.script.run
                    .withSuccessHandler(res => {
                        endLoading();
                        if (res && res.success) {
                            // Purge lokal langsung agar memori browser bersih seketika
                            if (state.db && state.db.pagu) {
                                state.db.pagu = state.db.pagu.filter(p => {
                                    const itemVal = p.Item || p.Iter || '';
                                    const bujpVal = p.BUJP || '';
                                    const pKey4 = p.WK + '||' + bujpVal + '||' + p.Deskripsi + '||' + itemVal;
                                    const pKey3 = p.WK + '||' + p.Deskripsi + '||' + itemVal;
                                    return p.ID !== id && pKey4 !== id && pKey3 !== id;
                                });
                            }
                            Swal.fire('Berhasil', res.message || 'Alokasi Pagu berhasil ditarik/dihapus.', 'success');
                            loadData(null, true);
                        } else {
                            Swal.fire('Gagal', res ? res.message : 'Terjadi kesalahan saat menghapus Pagu.', 'error');
                        }
                    })
                    .withFailureHandler(err => {
                        endLoading();
                        Swal.fire('Error', err.toString(), 'error');
                    })
                    .deleteMasterPagu(id, state.user);
            }
        }
    });
}

        
        function startClock() { setInterval(() => { const clock = document.getElementById('realtimeClock'); if (clock) clock.innerText = new Date().toLocaleString('id-ID'); }, 1000); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active-state'); }
        
        function logout() { 
            safeStorage.removeItem('budget_session_2026'); 
            state.user = null; 
            // MEMORY ISOLATION PURGE (EOS-GAS-016): Hancurkan seluruh authorized data residu dari RAM browser
            state.db = { 
                masterWK: [], masterPilihan: [], masterBUJP: [], pagu: [], 
                realisasiInternal: [], realisasiInvoice: [], realisasiStakeholder: [], masterJenisTrx: []
            };
            setView('landing-page', true); 
        }
        function fmt(n) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(n || 0); }
        function fmtShort(n) { if (n >= 1e9) return (n/1e9).toFixed(1) + ' M'; if (n >= 1e6) return (n/1e6).toFixed(1) + ' Jt'; return fmt(n); }
    </script>
